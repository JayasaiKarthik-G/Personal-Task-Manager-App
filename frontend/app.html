<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ToDo Today</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<!-- CSS -->
<link rel="stylesheet" href="app.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-black fixed-top border-bottom border-secondary">
    <div class="container-fluid px-3">

        <a href="app.html" class="navbar-brand fw-bold d-flex align-items-center gap-2 text-decoration-none">
            <i class="fa-solid fa-circle-check text-success"></i>
            <span>ToDo Today</span>
        </a>

        <button class="btn btn-outline-light btn-sm"
                data-bs-toggle="offcanvas"
                data-bs-target="#profileCanvas">

            <i class="fa-solid fa-user"></i>
            Profile
        </button>

    </div>
</nav>

<!-- PROFILE -->
<div class="offcanvas offcanvas-end text-bg-dark" id="profileCanvas">

    <div class="offcanvas-header">
        <h5><i class="fa-solid fa-user"></i> Profile</h5>
        <button class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
    </div>

    <div class="offcanvas-body">

        <div class="card bg-secondary border-0 p-3">
            <h5 id="profileFullName"></h5>
            <p id="profileUsername"></p>
            <p id="profileEmail"></p>
        </div>

        <div class="d-grid gap-2 mt-3">
            <button class="btn btn-warning" onclick="logoutUser()">
                <i class="fa-solid fa-right-from-bracket"></i> Logout
            </button>

            <button class="btn btn-danger" onclick="deleteAccount()">
                <i class="fa-solid fa-trash"></i> Delete Account
            </button>
        </div>

    </div>
</div>

<!-- MAIN -->
<div class="container-fluid app-wrapper">

    <div class="row g-0 app-row">

        <!-- LEFT -->
        <div class="col-12 col-md-6 left-panel">

            <div class="form-box">

                <h3 class="text-white text-center mb-4">
                    Task Manager
                </h3>

                <form id="taskForm" name="taskForm">

                    <label class="text-white mb-1">Task</label>
                    <div class="input-group mb-3">
                        <span class="input-group-text">
                            <i class="fa-solid fa-list-check"></i>
                        </span>
                        <input type="text" name="task" placeholder="Your task.." class="form-control">
                    </div>

                    <label class="text-white mb-1">Time</label>
                    <div class="input-group mb-4">
                        <span class="input-group-text">
                            <i class="fa-solid fa-clock"></i>
                        </span>
                        <input type="text" name="time" placeholder="09:00 am" class="form-control">
                    </div>

                    <div class="btn-row mt-2">

                        <button class="btn btn-success" type="submit">
                            <i class="fa-solid fa-plus"></i>
                            ADD
                        </button>

                        <button class="btn btn-primary" type="button" onclick="getTask()">
                            <i class="fa-solid fa-magnifying-glass"></i>
                            SEARCH
                        </button>

                    </div>

                </form>

            </div>

        </div>

        <!-- RIGHT -->
        <div class="col-12 col-md-6 right-panel">
            <div id="results"></div>
        </div>

    </div>

</div>

<script src="app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
